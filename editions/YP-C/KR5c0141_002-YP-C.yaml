seq: 2
front:
  text: 人怨若非不接人也神怒者非不事神也巧佞甚人愈怨淫祀盛神益怒
  hash: sha256:eea1d4709d841a4048da3c2669ee676983662059fc3d0c3f60098b1b829c53ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0141_YP-C_10nueji-07-0022b, image: JY137/10nueji-07-0022b.png}
body:
  text: 君道篇第四清靜無爲以身帥下始生之者天也養成之者人也萬物之始生者由乎天也助天而養之由乎人也能養天之所生而物攖之謂天子攖擾也人能助天養物而物馴擾之者是謂天子也昔舜有聖德三徙成都是也天子之動也以全天氣故此官之所以自立也立官者以全生也天不自治故聖人代天以治物者也聖人不能獨治故立官以輔之立官之由本以養物貴全天氣不使有虧傷今世之惑主多官而反以害生則失所以爲立官之本矣後世惑主務在多官官多則政煩政煩則害物是失立官之本意也草鬱則爲腐樹鬱則爲蠧人鬱則爲病國鬱則百慝並起危亂不禁鬱者氣未通之謂也官多政煩事有擁滯如草木之成腐蠹也所謂國鬱者主德不下宣人欲不上達也姦臣蒙蔽故主德不下宣黎庶枉屈故人欲不上達是故聖王貴忠臣正士爲其敢直言而决鬱塞也克己復禮賢良自至克損也復反也人君能以謙損反禮則賢良歸君耕后蠶蒼生自化天子親耕皇后親蠶以身率人則天下化之也由是言之賢良正可待不可求求得非賢也君有禮讓賢臣自歸故可待也君無禮讓雖復求賢賢至乃非賢也蒼生正可化不可刑刑行非理也君耕后蠶人自効之故可化也身不自爲而使人爲之人必不從雖復刑之刑行非至理堯舜有爲人主之勤無爲人主之欲天下各得濟其欲勤謂勞心以養物欲謂私身以奉己也有爲人主之位無爲人主之心故天下各得肆其心位謂居位而治事心謂求安以自適肆者申也士有天下人愛之而主不愛者有主獨愛之而天下人不愛者竭公忠而養天下者則天下愛之狥私情而媚一人者則其主愛之用天下人愛者則天下安用主獨愛者則天下危人主安可以自放其愛憎哉由是重天下愛者當制其情聖人以天下爲安危者也欲天下之安則人主不得縱其愛憎當抑制其私也所謂天下者謂其有萬物也所謂邦國者謂其有人眾也夫國以人爲本人安則國安故憂國之主務求理人之材天下以萬物爲多邦國以人眾爲富憂國家者不可不任賢以輔己也玉之所以難辨者謂其有硁石也金之所以難辨者謂其有鍮石也硁石似玉鍮石似金猶姦人外正內邪亦難辨也今夫以隼翼而被之鷃視而不明者正以爲隼明者視之乃鷃也隼鷹也鷃雀也今夫小人多誦經籍方書或學奇技通說而被以青紫章服使愚者聽而視之正爲君子也明者聽而視之乃小人也奇技異藝也通說雜說也故人主誠明以言取人理也以才取人理也以行取人理也人主不明以言取人亂也以才取人亂也以行取人亂也人主明者以言行取人盡皆理也主昏昧雖以言行取人盡皆亂也夫聖人之用人也貴耳不聞之功目不見之功口不可道之功而百姓暢然自理矣夫賢良之治世也不顯其名不彰其用不稱其能濳功密濟理自玄暢名迹不生人無企尚故聖主貴之也夫人主貴耳聞之功則天下之人運貨逐利而市譽矣若人主貴聞臣下之功則姦人運其財貨隨逐便利以市聲譽也貴目見之功則天下之人恢形異藝而爭進矣恢誕形容奇異技藝夸企爭進愈亂天下矣貴可道之功則天下之人習舌調吻而飾辭矣利口便辯虛而不實使天下之人市譽爭進飾辭見達者政敗矣爭名尚能則正理之道衰矣人主皆知鏡之明己也而惡士之明己也鏡之明己也功細士之明己也功大知其細失其大不知類也鏡知形之好醜士知心之善惡正形之功細正心之功大今人主乃貴其細而失其大豈不惑哉於呼人主清心省事人臣恭儉守職太平立致矣而世或難之吾所不知也若人主方寸之墜不明不斷則天地之宜四海之內動植萬類咸失其道矣方寸之地謂心之所居也動謂含氣之類植謂草木之類也以耳目取人者官多而政亂取聞見之功則飾偽者眾爭進者多主不能辨故官多而政亂也以心慮取人者官少而政清用心愿神識而得人者其官甚寡其政甚治也是知循理之世務求不可見不可聞之材澆危之世務取可聞可見之材嗚呼人主豈知哉以耳目取人人皆𣀮敓以買譽以心慮取人人皆靜正以勤德吏靜正以勤德則不言而目化吏𣀮敓以買譽則刑之而不𤰵音畏世主豈知哉臣道篇第五盡忠竭力謀効所司夫國之將興也朝廷百吏或短或長或醜或美或怡或厲或是或非醜惡也怡悦也厲嚴厲也雖聽其言觀其貌有似不同然察其志徵其心盡於爲國所以剛訐不怨黜退不愕議得其中無違乎理故天不惑其時墜不乏其利人不亂其豈鬼神開贊蠻夷柔同保合大和萬物化育國之興也朝廷祿位務盡其忠各竭其能力行公正無有阿私故天時不忒地利不乏人事不亂鬼神祐助遠方柔服也國之將亡也朝廷百吏姿貌多美顏色諧和詞氣華柔動止詳潤亡國之臣外雖和順內懷猜忌各徇其私闇相謀害雖觀其貌聽其言有若歡洽然察其志徵其心盡在競位所以聞奇則怪見異必愕相嫉相蒙遂喪其道故天告災時墜生妖物天反時爲災地反物爲妖人作凶德鬼神閒禍閒猶伺也戎狄交侵喪亂弘多萬物不化夫不傷貨財不妎人力不損官吏而功成政立下阜百姓上滋主德如此者忠賢之臣也若費財煩人危官苟效一時功利規賞於主不顧過後貽災於國如此者姦臣也至理之世官得人不理之世人得官邾龍𧡌問事君亢倉子曰旣策名而臣人者心莫若公無阿私也貌莫若和言莫若正公不欲靈和不欲雜正不欲犯君不見察亦不欲犯顏而諫也古之清勤爲國修政今之清勤爲身修名夫爲國修政者區處條別動得其宜合於大體爲身修名者區處條別致遠不通拘於小節是知心以道爲主抵事得其所心以事爲主抵物失其所以道爲主公心也以事爲主私情也抵者觸也臣居上位不諫下位不公不合贍其祿贍賙給也君不嚴敬大臣不彰信小臣不合官其朝有才者不必忠忠者不必有才臣不患不忠適恐盡忠而主莫之信主不患不信適恐信之而莫能事事事事猶用事也上等之人得其性則天下理中等之人得其性則天下亂明主用上等之人當委以權宜便豈肆其所爲上等之人謂賢良也公平正直無所阿私使之莅職信能匡贊雖權變有時必歸於正也用中等之人則當程課其功示以賞罰中等之人謂藝能之士見善則遷見惡則染故人主以賞罰制之也賢道篇第六克己復禮賢良自至賢良所以屢求而不至難進而易退者非爲愛身而不死王事適恐盡忠而主莫之信耳自知有材識之人外恭謹而內無憂其於眾也龢正而不狎親之則彌莊疏之則退去而不怨窮厄則以命自寬榮達則以道自正人有視其儀賢也聽其聲賢也徵神課識或負所望夫賢人其見用也入則諷譽出則龔默職司勤辦居室儉閑諷謂刺君之過譽謂稱君之美龔默靜愼也辦治也閑謂防閑其未見用也藏身於眾藏識於目藏言於口飽食安步獨善其身貞而不怨智者不疑豈識者不疑人有識之士行危而色不可疏言遜而理不可拔謂遇濁世不變其志行雖危而色常和言雖遜而理確然凡謂賢人不自稱賢自伐者無功故非賢効在官政功在事事驗其官政察其用事賢不肖可辯也太平之時上士運其識中士竭其耐小人輸其力齊有掊子者材可以振國行可以獨立振濟也獨立謂德行孤標不可傾拔事父母孝謹鄉黨恭循念居貧無以爲養施信義而游者久之矣所如寡合或爲乘時夸毗者所蚩紿如往也本作所蚩往紿音待一云始於是也寡合少諧偶也夸毗矜恃也蚩笑也紿欺也於是負杖步足問乎亢倉子曰吾聞至人忘情至人虛懷與道合體故忘情也黎人不事情黎眾也智力愚昧不能用情也存情之曹務其教訓而尊信義曹輩也中人存情以信義爲尊吾乃今不知爲工工猶能也躬行信義所往寡合不知其所爲能受不信爲信世有受人之不信將以爲信也信而不見信爲信有實爲信而不爲人所見信乃自以爲信爲勤慕義爲義人有本非義而以慕義爲義乃爲人所稱義也義而不俟義爲義有實爲義而不待人稱義亦常自爲義也然則信義之士常獨厄隨退胡以取貴乎時而教理之所上也亢倉子俯而循袵仰而譆超然而歌袵衣襟也譆歎聲也超然高舉之貌曰時之陽兮信義冈凶音昌時之陽喻君有道也有道則信義昌也時之默兮信義伏時之默喻君暗昧也君暗昧則信義伏藏陽與默昌與伏汨吾無誰私兮羌忽不知其讀汨亂也羌發聲也讀猶云也夫時有治亂故用有行藏陽則與時俱昌默則與時俱伏隨流任運寧有私耶今乃問我不知其云也夫運正性以如適而物莫之應者眞不行也夫眞且不行謂之道喪信義者正性之用也眞者正性之本也道喪之時上士乃隱隱之爲義有可𤓸音爲也時有否泰莫得長爲莫可爲者有可用也邦有道則智邦無道則愚有時而用故莫可用者也用有行藏莫得長用祭公問賢材何從而致亢倉子曰賢正可待不可求材愼在求不愼無材在求而擇之不愼無材若天子靜大臣明刑不避貴澤不隔下則賢人自至而求用矣賢人用則四海之內明目而視清耳而聽坦心而無鬱矣天自成地自甯萬物醇化鬼神不能靈天下醕和故鬼神不能見靈怪故曰賢正可待不可求若天子勤明大臣和理之求士也則恢弘方大公直靖人之才至若天子苛察大臣躁急之求士也則囗丗八丅心巧應毁方破道之才至若天子疑忌大臣巧隨之求士也則奇姓異名仄媚怪術之才至若天子自賢大臣固位之求士也則事文逐譽貪濁浮麗之才至若天子依違大臣回佞之求士也則外忠內僻情毒言和之才至故曰才愼在求不愼無昔者黃帝得常仙封鴻𢇼音鬼容邱三人黃帝臣也商王得伊尹中興得甫申中興周宣王也甫仲山甫也申申伯齊桓得甯籍卽甯戚也皆由數君體道邁仁布昭聖武思輯光明寬厚昌正而眾賢自至而求用非爲簡核而得之也邁行也輯睦也簡核猶擇也祭公曰夫子云賢人不求而自至亦有非賢不求而自至者乎亢倉子曰夫非賢不求而自至者固眾矣夫天下有道則賢人不求而自至天下無道則非賢不求而自至人主有道者寡無道者眾天下賢人少不肖者多是知非賢不求而自至者多矣祭公曰賢固濟天下材亦能濟天下俱濟天下賢與材安異耶亢倉子曰窘乎哉其問也窘迫也言所問切迫夫功成事畢不徇封譽恭退朴儉之謂賢徇求也功成不居其位守恭謙以自牧也功成事畢榮在祿譽光揚滿志之謂材賢可以鎭國材可以理國所謂鎭者龢寧無爲人不知其力至德濳化人莫能知之也所謂理者勤率其事人知所於德人賴其功故推德於己也一賢統眾材則有餘眾材度一賢猶不足如是賢材之殊域一賢雖少統領眾材尚有餘德眾材雖多比度一賢猶不能及有居山林而諠者有在人俗而靜者有諠而正者有靜而邪者也言求賢不可不察其邪正矣凡視察其貌鄙俗而能有賢者萬不有一視察其貌端雅而實小人者十而有九言賢人難得也夫不鍊其言而知其文不責其儀而審其度不采其譽而知其善不流其毁而斷其寶可謂有識者也
