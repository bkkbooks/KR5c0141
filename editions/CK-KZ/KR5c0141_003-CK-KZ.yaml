body:
  text: 不待流言毀謗而知其惡情也訓道篇第七至德之用萬教之主神明共贊可以化民閔子騫問仲尼道之與孝相去奚若疑其相去遠也仲尼曰道者自然之妙用孝者人道之至德窮於本始謂之道施於人理謂之孝道能通生萬物不知其所由然故曰妙用孝者善事父母盡敬盡順通乎神明故曰至德夫其包運天地發育萬物曲成類形布丕性壽性者剛柔之質壽者一期之盡其功至實而不爲物府不爲事官無爲功尸捫求眎聽莫得而有字之曰道雖曲成萬類彫刻眾形尋求生宰莫見其眹故字之曰道道者虛通之謂用之於人字之曰孝孝者善事父母之名也夫善事父母敬順爲本意以承之順承顏色無所不至發一言舉一意不敢忘父母營一手措一足不敢忘父母事君不敢不忠朋友不敢不信臨下不敢不敬嚮善不敢不勤雖居獨室之中亦不敢懈其誠此之謂全孝故孝誠之至通乎神明光于四海有感必應善事父母之所致也昔者虞舜其大孝矣乎庶母惑父屢憎害之舜心益恭懼而無怨謀使浚井下土實之于時天休震動神明駿赫道穴而出奉養滋謹由是玄德茂盛爲天下君善事父母之所致也按史記稱舜父瞽叟與庶母弟皆欲殺舜使舜修廩瞽叟從下縱火焚廩舜乃以兩笠自抒而下去得不死後又使舜穿井舜穿井爲匿孔旁出舜旣入深瞽叟與象共下土塡井舜匿孔出去是其事也于時天以休美之德震動舜心神功赫然令其免害及出之後事父彌謹堯知其聖歷試諸難後乃禪其位焉文王之爲太子也其大孝矣朝夕必至乎寢門之外問寺人曰兹日安否何如寺人奄官主在左右侍君也曰安太子温然喜色小不安節太子色憂滿容朝夕食上謂侍者進食於君也太子必侍寒煖之節食下必知膳養所進然後退知所食之多少寺人言疾太子肅冠而齋君有疾故太子嚴肅衣冠而齋齋者虛心專志以祈神明使救護者耳膳宰之饌必敬眎之湯衣之貢衣必親賞之饌飲食也貢進之也嘗饌善謂君嘗饌者也則太子亦能食嘗饌寡太子亦不能飽以至乎復初然後亦復初君病間而太子亦復初也君后有過怡聲以諷怡悦也謂下氣怡聲幾微諷諫君后所愛雖小物必嚴龔不敢慢君父之所愛是故孝成於身道洽天下雅曰文王陟降在帝左右雅詩大雅也陟升也帝天也左右助也言文王所爲天必助之言文王靜作進退天必贊之故紂不能害贊佐也文王事紂爲天所佐故殷紂雖暴不能輙害夢啟之壽禮記云文王有疾旬有二日乃間文王謂武王曰汝何夢矣武王對曰夢帝與我九齡文王曰汝以爲何也武王曰西方有九國君王其終撫諸文王曰非也我百爾九十吾與汝三焉文王九十七而終武王九十三而終也卜世三十卜年七百天所命也善事父母之所致也左傳曰成王定鼎于郟鄏卜世三十卜年七百天所命也閔子騫曰善事父母之道幸旣聞之矣敢問教子之義仲尼曰凡三王教子必視禮樂視猶示也樂所以修內和其心也禮所以修外檢其容也禮樂交修則德容發輝于貌故能温恭而文明夫𢏽人臣者殺其身有益於君則爲之況利其身以善其君乎是故擇建忠良貞正之士爲之師傅欲其知父子君臣長幼之道夫知爲人子然後可以爲人父知爲人臣然後可以爲人君知事人然後能使人此三王教子之義也三王謂夏殷周三代之王也閔子騫退而事之於家三年人無間於父母兄弟之言上事父母下順兄弟盡善盡美故人無非間之言也交遊稱其信鄉黨稱其仁宗族稱其悌德行之聲溢於天下此善事父母之所致也齊太子坐清臺之上燕壯侯他壯燕侯謚也他名也高冠嚴色左帶玉具劍右帶環珮左光照右右光照左言玉珮之光交相照也太子讀書不視壯侯他問曰齊國有寶乎太子曰主信臣忠百姓戴上齊國之寶也壯侯他應聲解劒而去聞義而服也此言君子尚德不尚華飾也嗚呼人有偏蔽終身莫自知已乎賢者見之寬恕而不言小人暴愛而溢言親戚憐嫉而貳言人有偏蔽惡乎不自知哉惡乎猶何也是故君子檢身常若有過衣其衣食其食知其過而不𡱀音克有以正之者君子恥之言爲人口不能有所匡正也將欲有言識其必不能行者君子罕言君不納忠諫則罕言以避患也當責眾人之惡者視己善乎哉當責眾人之邪者視己正乎哉此之謂反明先審身之善正然後責人之邪惡也翟西氏之子甚孝謹翟西憐其子而好妄與之言翟西𠨱出夕返則曰甲死矣其子信之旣而甲在焉他夕則曰乙且害余其子伺將行仇旣而不見惡端他夕則曰丁病矣其子覘之丁誠無恙舉此類也覘視也恙憂也舉皆也冒淹年序子固孝謹至於訓勒益不保承鄉國之人疾其咎口謀將煞之翟西聞而懼歸以告子子未甚信旣而翟西見煞此章戒人輕言致害雖愛子猶不信之以至見煞况他人乎謂多言之人爲疎露亦有辭約而不密者謂輕佻之人爲不定亦有體閑而心躁者輕佻猶輕躁也謂藂雜之人爲猥細亦有外潔而內濁者若類而引之不可殫載若非徹識孰𠧳音克究詳殫猶盡也時有不可不應𡷮也者內靜而外動易動而難靜謂外見利貪而逐之愈得愈貪故身勞而難靜時有不可不求𡷮也者內思而外待待至而後樂謂內興情慾緣境思求心有所待故待得而復樂不知心搖而傷性是故外靜而內動者搖思而損性奔走而逐利者勞力而害名唯泊然無情慾而不爲名利所誘者然後身安而性全也人生於世或有豈不遂志而宣言云不遇時者是無異負丹頸之罪俟時行戮豈不殆哉不能危行言遜干犯時君無異負斬首之罪待時行戮也丹血色其博才通識未見稱用者正可云時非不清命未與耳豈不韙歟韙猶是也長於諫者務依存前人之性而翦制其情之所由起是以彼此開進親敬殷篤不長於諫者務攻前人之性而暗於情之所來是以彼此嫌貳猜釁日積兒童之所簡者迺耆耋之所非耳目之所娛者乃心慮之所疾健責天下之愚者己之未賢也健責天下之迷者己之未明也賢明者當恕愚迷而勿責以未賢責眾愚未賢者以之亡以未明責眾迷未明者以之傷愚迷之人無所損健責者徒自傷耳農道篇第八夫穀者人之天理榖之道務農爲本人捨本而事未則不一令本謂農也未謂趍浮利也人趍末利則奸詐多端故一令不能制也不一令則不可以守不可以戰趨利多端人心不一故不可以固守不可以攻戰也人捨本而事未則兀音其產約人貪浮利則產業薄也兀產約則輕流徙輕流徙則國家時有灾患皆生遠志無復居心人捨本而事未則好知好知則多詐多詐則巧法令巧法令則以是爲非以非爲是古先聖王之所以理人者先務𦦥人𦦥人非徒爲墜利也貴行其志也志在安人人𦦥則朴朴則易用易用則邊境安安則主位尊人𦦥則童如童兒無異志也童則少私義少私義則公法立力博深𦦥則兀產複複猶厚也兀產複則重流散不流散也重流散則死其處無二慮是天下豈一心矣天下一心軒皇几蘧之理不足過也軒皇几蘧古之有道之君也古先聖皇之所以茂耕織者以爲本教也是故天子躬率諸侯耕籍田火夫士第有功級勸人尊墜產也第次第也月令云正月中氣天子乃擇元辰親載耒耜置之車右率公卿諸侯大夫躬耕籍田天子三推三公五推卿諸侯九推是以功級勸人也后妃率嬪御蠶於郊桑公田勸人力歸教也月令云三月中氣命有司無伐桑柘乃修蠶器后妃齋戒享先蠶而躬桑以勸蠶事祭義云古者天子諸侯必有公桑蠶室近川而爲之君卜三公之夫人世婦之吉者使入蠶室世婦親蠶奉蠒以示于君遂獻于夫人夫人繰三盆手遂布於三宮夫人世婦之吉者使繰之此勸婦教也男子不織而衣歸人不耕而食男女貿功資相爲業此聖王之制也貿猶易也故敬時愛日埒實課功埒量也非老不休非疾不息一人勤之十人食之上農夫食十人當時之務不興土功不料師旅男不出御女不外嫁一作大嫁以妨𦦥也興土功治師旅行婚嫁皆謂妨農業也御迎也謂男子不親御黃帝曰四時之不可正正五穀而已耳夫稼爲之者人也稼謂稼也生之者天也養之者地也是以稼之容足耨之容耰耨鋤也又耰謂鋤器也耘之容手耘除草是謂耕道種苗可使容足耨之可使容耰耘之可使容手𦦥攻食工攻器賈攻貨攻治也時豈不龔敚之以土功是謂大𣧑君王不恭則大凶之道也凡稼早者先時暮者不及時寒暑不節稼乃多災言太早太晚者謂不得中和之氣也冬至已後五旬有七日而昌生旬十日也五十七日在立春節中而草木昌發於是乎始耕𡷮𦦥之道見生而蓺生見死而穫死因天時而興人事也蓺種也穫刈也天發時墜產財不與人㫕音期產生也有年祀土無年祀土有年豐年也無年荒年也祀土祭社稷也春祭祈豐祥也秋祭報成熟也不以有年則祭無年不祭所以祈地利重人命無失人時迨時而作過時而止老弱之力可使盡起迨及也雖老弱可使盡耕所以趍時也不知時者未至而逆之謂興農太早也旣往而慕之時旣過往而慕之是大晩當其時而薄之雖當其時而用功寡薄所收亦不多此從使之下也此三者雖從農務不得其時故云下也夫耨必以旱使墜肥而土緩夫鋤必用旱時旱時則草易死而土脉肥緩也稼欲產於塵土而殖於地堅者殖長也下種欲其土細如塵則地虛而根深及苗長也得雨則土堅堅則莖固也愼其種勿使數亦無使疎數爲煩也於其施土無使不足亦無使有餘施土謂施種於土也種不足則傷疎而費地種有餘則傷密而損穀不費不損取其中也甽欲深以端畝欲沃以平端正直也甽深直則水流疾畝沃平則潤澤匀下得陰上得陽然後咸生下陰謂水潤上陽謂日氣立苗有行故速成强弱不相害故速大苗成行則長疾强不害弱則易大也正兀行通其中疏气三泠風使苗疏而通風則有收而多功率稼望之有餘就之則疏是墜之竊也由地瘠薄也苗不茂盛若被竊之狀不除則蕪除之則虛是豈傷之也除治也草盛而後除之苗則虛矣是人事傷之也苗兀弱也欲孤欲一一孤生不併聚也兀夫也欲相與居與眾同居共相蔭映兀熟也欲相與扶無倒折之害也三以𢏽族稼乃多穀三者如人之宗族共相扶持則多收凡苗之患不俱生而俱死生不齊則大苗凌小小苗不茂是以先生者美米後生者爲枇强者凌弱故後生者不實是故其𧂭也仧其兄而去其弟以人喻苗也先生爲兄後生爲弟也樹肥無使扶疎樹墝不欲專生而獨居墝瘠地專生獨居不耐風旱肥而扶疎則多粃墝而專居則多死不知耨者去其兄而養其弟不收其粟而收其粃上下不安則稼多死得時之禾長秱而大穗圜粟而薄糠米飴而香舂之易而食之强禾謂粟也秱穗頸也圜圓也飴謂味甘如飴也失時之禾深芒而小莖穗鋭多粃而青蘦深芒長芒也鋭細也青蘦其米青也得時之黍穗不芒以長搏米而寡糠搏謂以手挼穀而出米失時之黍大本華莖葉膏短穗本根也華莖莖傍有華也膏言肥大也得時之稻莖葆長秱穗如馬尾葆大也馬尾言長也失時之稻纖莖而不滋厚糠而菑死得時之麻疎節而色陽堅枲而小本陽光揚也堅牢也言皮堅勁失時之麻蕃柯短莖岸節而葉蟲蕃柯謂枝柯多也岸節者高節也得時之菽長莖而短足其莢二七以爲族多枝數節競葉繁實稱之重食之息菽者豆也族聚也息猶盈也失時之菽必長以蔓浮葉虛本疎節而小莢得時之麥長秱而頸族二七以𤓸行薄翼謂䵍音屯色食之使人肥且有力薄翼謂糠也䵍黄色也其麥穗一行有二七粒失時之麥胕腫多病弱苗而翜穗胕腫謂莖根麤而且蟲翜穗多芒是故得時之稼豐失時之稼約庶穀盡宜從而食之使人四衛變强耳目聰明𣧑氣不入身無苛殃四衛四支也善乎孔子之言冬飽則身温夏飽則身凉夫温凉時適則人無疾疢人無疾疢是疫癘不行疫癘不行咸得遂其天年故曰穀者人之天是以興王務王不務是棄人也王而棄人將何國哉兵道篇第九兵者不祥之器不得已而用之秦景王將眎强兵於天下秦恃崤亟險固兵强士勇故欲示强於兵使天下无敢與之敵眎猶示也使庶仧鮑戎必致亢倉子庶長秦爵號鮑戎人姓名也待以壞邑十二周實迫之周密也欲問亢倉子計故以十二邑待之恐其不來密使鮑戎迫之使必來亢倉子至自榮泉賓于上館榮泉秦地名也景主三日弗得所問謂欲問之而不得也下席北首頓珪曰天果無意恤孤耶北首頓珪盡禮也亢倉子油然虧眄曰朕以王𤓸異之問而寧弊弊焉以斫刺𤓸故油然微動貌虧側也眄顧盻也朕我也我以景主有遠異之問而何爲弊弊焉言景主以兵戈斫刺爲故乎言其所問下抑者亦隨其欲而得正焉無如可矣言景王旣以兵道問我故我抑亦隨其所欲而正之非至理之可也景王一拜再舉斂黼袵端珪抑首而坐曰實惟天所命黼袵繡襟也抑首低首也惟天所命願垂告命亢倉子仰榱而噓俯正顏色曰原兵之所起與始有人俱榱椽也仰榱仰面屋榱也噓歎聲也嗟其不問至道故仰面而發噓歎夫兵之所起與人俱生本始有之非獨今也凡兵也者出人之威也人之有威性受於天人有喜怒之性本受於天怒則威生威生則兵起之由也故兵之所自來上矣嘗無少選不用少選猶少時也喜怒之情用之無常故無少時不用也貴賤仧少賢愚相與同同察怒氣之動則知兵起之原察兵之兆在心懷恚而未發兵也疾視作色兵也傲言推捘兵也侈鬭攻戰兵也此四者鴻細之爭也恚怒也作色厲色捘亦推也謂相推盪也四者雖有大小之異皆有怒心故爲兵也未有𧈧尤之時人實揭材木以鬭矣𧈧尤黃帝時掾諸侯兄弟八十一人銅頭鐵額與帝戰於涿鹿之野造兵器後爲黃帝所滅也黃帝用水火矣或引水注邑或縱火燒城共工稱亂矣共工與顓頊爭天下五帝相與爭矣一興一廢勝者用事用兵之道有廢有興皆以順天而勝者得用耳夫有以咽藥而死者欲禁天下之醫非也有以乘舟而死者欲禁天下之船非也有以用兵喪其國者欲禁天下之兵非也夫兵之不可廢譬水火焉善用之則爲福不善用之則爲禍是故怒笞不可偃於家刑罰不可偃於國征罰不可偃於天下笞鞭杖偃息也古之聖王有義兵而無偃兵義兵者順天應人所以誅暴亂也兵誠義以誅暴君而振苦人人之悦也若孝子之見慈親餓隸之遇美食號呼而走之若强弩之射深谷也振救也隸僕隸也强弩之射深谷言救之疾也勝負之决勿徵於他必反人情兵之勝負勿徵驗於他反求人情則得之人之情欲生而惡死欲榮而惡辱死生榮辱之道一則三軍之士可使一心矣人君與三軍之士同其死生榮辱則三軍雖眾可使一心矣凡君欲其眾也心欲其一也三軍一心則令可使無敵矣古之至兵蓋重令也古之至極善用兵者蓋重愼其令也故其令强者其敵弱其令信者其敵詘先勝之於此則勝之於彼夫料敵制勝必先自料若與眾同死生而三軍一心則勝於彼矣誠若此則敵胡足勝也凡敵人之來也以求利也今來而得死且以走爲利敵皆以走爲利則刃無所與接矣此之謂至兵傲虐奸詐之與義理反也言奸兵與義兵逆順之理相反其勢不俱勝不兩立義兵勝奸兵敗故義兵之入於敵之境則人知所庇矣兵至於國邑之郊不踐果稼不穴邱墓不殘積聚不焚室屋得人虜厚而歸之信與人期以敚敵資以章好惡以示逆順先示之以義也若此而猶有愎狠凌傲遂宕不聽者雖行武焉可也愎狠猶惡戾也宕流宕也先行義以示之猶有惡戾不聽服者用武誅之可也先發聲出號令曰兵之來也以除人之讎以順天之道故剋其國不屠其人獨誅所誅而已矣獨誅者暴君也於是舉選秀士賢良而尊封之求見孤疾長老而拯救之孤疾之人拯給之長老者致敬之也發府庫之財散倉廩之穀不私其物曲加其禮不私其利與眾共之曲加其禮聘以求賢也今有人於此能生死一人則天下之人爭事之矣生猶活也言有人以義能活一人之死則天下咸能事之矣義兵之生一人亦多矣人孰不悦故義兵至則鄰國之人歸之若流水誅國之人望之如父母行地滋遠得人滋眾辭未終景主興稽首曰孤獲聞先生教言不覺氣盈宇宙志知所如也而心滋益龔旣聞義兵之道鄙其奸傲之心故氣志盈滿充塞宇宙志知所如也於是步前稱音觴爲亢倉子壽舉步前進稱獻壽所以嚴師重道也拜居首列師位嚴于齋室又月涉旬辰加天關白晝行道天關卽天綱謂辰時也行道行弟子禮也
