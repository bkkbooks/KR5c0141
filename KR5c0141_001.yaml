body:
  text: 何璨注全道篇第一夫心冥虛極德洞玄微功並四時蒼生自化亢倉子居羽山之顔三年羽山尚書禹貢在徐州舜典云殛鯀于羽山蓋在東裔後屬魯顔山之南面也莊子引此章云北居崴壘之山即此山是也俗無疵癘而仍穀熟賢聖之居天祐神助近無疵癘而五穀豐稔頻熟曰仍也其俗竊相謂曰亢倉子始來吾鮮然異之鮮然驚異之貌也異其虛懷寂泊不在近情今吾日計之不足歲計之有餘其或聖者耶驗其利益故疑之為聖人盍相與尸而祝之社而稷之乎盍何不也既蒙厚利欲立為君何不建置宗廟並及社稷尸穀祝祭南面事之者乎亢倉子聞之色有不釋其徒黶啜從而啓之黶啜亢倉子之門人也欲允衆心故從而啓之亢倉子曰吾聞至人尸居環堵之室而百姓猖狂不知其所如往至人冥心絶慮有類於尸無事蕭然獨居環堵蒼生欣慕共往歸依察其所歸非由知者也今以羽俗子父竊竊焉將俎豆豫我其的之人耶竊竊私議之謂也我本棲隱全道任真今乃俎豆相尊反成人之標的也吾是以不釋於老聃之言老聃言我無為而民自化我無事而民自足我好靜而民自正今乃反此故不釋然黶啜曰不者不者猶不然也夫尋常之汙巨魚無所還其體而鯢鰌音為之制步仞之丘巨獸無所隱其軀而孽狐之祥八尺曰尋倍尋曰常汙池也還回也鯢小魚而有腳制猶專擅也六尺曰步七尺曰仞孽祅也祥善也言小水不能容巨魚小丘不能藏大獸喻亢倉道德既高必須厚祿也且也尊賢豈音事能嚮善就利自堯舜以固然而況羽俗乎先生其聽矣亢倉子曰嘻來嘻歎聲也怪其不達己志故發嘻歎將欲告之遠致故呼之曰來也夫二子者知乎二子堯舜也知乎言豈知也函車之獸介而離山罔罟制之吞舟之魚蕩而失水螻蟻苦之故鳥獸居欲其高魚鱉居欲其深夫全其形生之人藏其身也亦不厭深渺而已函盈也介孤介也渺遠也吾語若大亂之本祖乎堯舜之間其音終存乎千代之後千代之後必有人與人相食者矣若汝也夫事有先成後敗始吉終凶胡可必耶故堯舜襌讓光一時之美迹流後代成篡弒之禍故莊子云堯舜讓而帝之噲讓而絶湯武爭而王白公爭而滅斯其效歟夫唯不立善名者則事迹宜絶無所企慕耳言未男子榮之樗色蹴然膝席曰樗年運而長矣將奚以託業以豈斯言榮之樗莊子所謂南榮趎也既聞高義深欲蹴然變色斂膝于席願垂告示以敬事此言亢倉子曰全汝形抱汝生無使汝思慮營營若此緒年或可以及此言營營運動不息也緒終也全形抱生不運思慮虛心冥寂道自居之若此終年可及此言也雖然吾才小不足以化子子胡不南謁吾師聃聃老子之字也亢倉子既謝榮之樗不釋羽俗而龍已乎天下謝猶遣也不釋羽俗潛遁而遊如龍變化與時升降水之性欲清土者滑音骨之故不得清人之性欲壽物者滑之故不得壽滑亂也人性壽考為外物所亂故使不終天年物也者所以養性也今世之惑者多以性養物則不知輕重也衣食養性不可一日而無而惑者乃損性以求物物愈積而性愈傷殊不知性重而物輕蓋倒置者也是故聖人之於聲色滋味也利於性則取之害於性則捐之此全性之道也萬人操弓音共射一招招無不中萬物章章以害一生生無不傷捐棄也操持也招射的也章章猶擾擾也故聖人之制萬物也全其天也聖人抑制萬物不使傷性以全天真天全則神全矣神全之人不慮而通不謀而當精照無外志凝宇宙德若天墜然上為天子而不驕下為匹夫而不惛此之為全道之人神全之人智慮充溢精明照於無外志氣凝乎宇宙覆載之德同乎天地雖貴為天子賤為匹夫不以窮達而回其志者也心平正不為外物所誘曰清清而能久則明明而能久則虛虛則道全而居之秦佚死亢倉子哭之秦佚古之有道者蓋老子之友也其伇曰天下皆死先生何哭也伇謂門人充使伇也死生之道古今是常達人體之不哭可也亢倉子曰天下皆哭安得不哭順物而哭雖哭而非哭也其伇曰哭者必哀而先生未始哀何也未始猶未嘗也世人之哭必生哀痛今先生雖哭不見悲傷敢問何故也亢倉子曰舉天下之吾無與樂安所取哀夫有樂必有哀人之常情也達人大觀豈有踈親既不與為樂亦無所取哀蛻墜之謂水蛻水之謂氣蛻氣之謂虛蛻虛之謂道蛻者免脫之謂也夫脫地之謂水脫水之謂氣脫氣之謂虛脫虛之謂道猶至人不係情於哀樂然後為極也虛者道之體靖者道之地理者道之綱識者道之目言至人能虛能靜有識有理者則能契道之形體知道之綱目道所以保神德所以弘量禮所以齊儀物所以養體四者皆可以資身不可暫無也好質白之物者以黑為汙好質黑之物者以白為汙吾又安知天下之正潔汙哉由是不主物之潔汙矣夫瞀視者以黈為赤以蒼為玄吾乃今所謂皂白安知識者不以為頳黃吾又安知天下之正色哉由是不遁物之色矣瞀風眩也黈黃色也頳赤色也夫有風眩之疾者視物不能審也故以黃為赤以青為黑亦猶凡俗之情妄執潔汙雖有大聖孰能正之故不主一其潔汙不流遁於衆色也夫好貨甚者不見他物之可好好馬甚者不見他物之可好好書甚者不見他物之可好吾又安知天下之果可好者果可惡者哉由是不見物之可以保戀矣無能滑吾仧音長矣果決定也保猶懷也陳懷君柳使其大夫禱行聘於魯懷君諡也柳名也禱陳大夫之名也叔孫卿私曰叔孫氏世為魯卿也吾國有聖人若知之乎聖人謂仲尼也陳大夫曰奚以果明其聖叔孫卿曰能廢心而用形聖境超殊非凡情所測徒見其能應接世務便證以為聖人豈知其所聖哉陳大夫曰弊邑則小亦有聖人異於所聞曰聖人誰陳大夫曰有亢倉子者偏得老聃之道門人之中最為稱首故曰偏得也其能用耳視而目聽定公聞而異焉使叔孫氏報聘且致亢倉子待以上卿之禮亢倉子至賔于亞寢亞寢公之次殿魯公卑辭以問之亢倉子曰吾能聽視不用耳目非能易耳目之所用告者過也公曰孰如是寡人增異矣其道若何寡人果願聞之亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠際八荒之表邇在眉睫之內來干我者吾必盡知之乃不知是我七竅手足之所覺六腑五臟心慮之所知其自知而已矣心形泯合神氣冥符洞然至忘與無同體然後心彌靜而智彌遠神愈默而照愈章理極而自通不思而玄覽非夫至聖至神其孰能與於此哉斯固靈真之要樞重玄之妙道也用道篇第二無非利物上合天心克己歸仁化行刑措天不可信墜不可信人不可信心不可信惟道可信賢主秀士豈可知哉昔者桀信天與其祖四海已不勤於道天奪其國以授殷紂亦信天與其祖四海己不躬於道天奪其國以授周與猶以也祖猶主也夏桀殷紂耽淫奢縱自云有命稟於上天窮凶肆虐不修其道故天奪其國以授於湯武今夫墮農音農信墜實生百穀不力於其道墜竊其果稼而荒翳之墮農之人信墜生穀不勤耘耕稂莠荒蕪故不能獲果稼齊后信人之性酬讓不明於其道舉全境以付人人實鴟義而有其國后君也齊簡公也信人性不明酬讓為陳恆之所弒而取其國鴟義喻貪殘也凡人不修其道隨其心而師之營欲茂滋災疾朋釁戕身損壽心斯害之矣人自師心不遵聖教營欲熾盛百殃斯集此乃心為身害朋猶群也釁猶動也戕害者也故曰惟道可信道者坦蕩恬怡無所染著人能虛心歸道則身命保全也天墜非道不能悠久天得一以清地得一以寧蒼生非賢不能靖順庶政非材不能和理賢材皆用道以理物夫用道之人不露其用福滋萬物歸功無有潛功密濟百姓謂我自然神融業茂靈慶悠長融通也神理通達德業榮茂積善所鐘慶流後裔也知而辨之謂之識知而不辨謂之道識以理人道以安人辨析事物使人去惡就善所以理人也含弘沖寂無所毀譽所以安鎮浮競也夫雞辰音辰而作負日任勞流汗灑墜夜分僅息夫之道也雞晨謂雞鳴之旦也夜分中夜負日為日所曝也僅少也俯拾仰取鋭心錐撮力思搏精希求利潤賈竪之道也咽氣谷神宰思損慮超遙輕舉日精鍊仙高士之道也咽氣胎息五牙之類也谷養也宰割也日精吸日精也鍊仙鍊質專而乃升仙也剸情專想畢志所事倫揆忘寢謀效位司人臣之道也專情正想盡忠於所事之君導理揆度效功於所司之位是人臣之道也清心省念察驗近習務求才良以安萬姓人主之道也清心寡嗜欲也省念無私也近習謂近臣若由是類之各順序其志度不替塞音塞其業履是為天下有道農夫賈竪各保其業明君賢臣各修其道則天下順序而業履安定者也導筋骨則形全翦情欲則神全靖言語則福全音尅此三全是謂清賢道德盛則鬼神助信義敦則君子合禮義備則小人懷有識者自是無識者亦自是有道者靜默暗鈍者亦靜默物固有似是而非似非而是先號後笑始吉終凶身可親而才不堪親才可敬而身不堪敬敬甚則不親親甚則不敬親之而疏疏之而親恩甚則怨生愛多則憎至有以速為貴有以緩為貴有以直為貴有以曲為貴百事之宜其由甚微不可不知是故智者難之靜則神通窮則意通貴則語通富則身通理勢然也王本云理勢使然也同道者相愛同藝者相嫉同與者相愛同取者相嫉同病者相愛同壯者相嫉人情自然也情通無求則相愛爭能尚勝則相嫉勢使然也才多而好謙貧賤而不諂處勞而不為辱貴富而益恭勤可謂有德者也政道篇第三順天行令不擇親踈異域同歸望風而靡人無法以知天之四時寒暑日月星辰之所行若知天之四時寒暑日月星辰之所行當則諸生血氣之類皆得其處而安其産矣人臣亦無法以知主之賞罰爵祿之所加若知主之賞罰爵祿之所加宜則親疏遠近賢不肖皆盡其才力而以為用矣信全則天下安信失則天下危夫百姓勤勞財物殫盡則爭害之心生而不相信矣人不相信由政之不平也政之不平吏之罪也吏之有罪刑賞不齊也刑賞不齊主不勤明也夫主勤明則刑賞一刑賞一則吏奉法吏奉法則政下宣政下宣則民得其所而交相信矣是知天下不相信者由主不勤明也亢倉子居息壤五年息壤是周地名也靈王使祭公致篚帛與紉璐靈王周靈王也祭公周之卿士也璐美玉也靈王慕亢倉之德使祭公致玉帛之禮以聘之篚盛帛之篚也紉所以貫玉者也曰余末小子否德忝位水旱不時藉為人若何以禳之靈王云我淺末小子不明其德忝君寶位致使水旱失時人遭飢苦故請問禳辟之方也亢倉子曰水陰沴也陰於國政類刑人事類私沴亂也水陰象陰主刑水又潛流私匿之類也若刑獄不直人事多私則有沴水之災也旱陽過也陽於國政類德人事類盈旱陽象陽主德陽為顯盛驕盈之類也若君不修其德人事盈侈則有大旱之災也楚以為凡遭水旱天子宜正刑修德百官宜去私戒盈則以類而消百福日至矣楚亢倉子名也後皆放此鄭有胡之封圭戎弓胡國名封圭大圭也戎弓弓名也二物本胡國所有後為鄭所得也異時失同於荆異時猶他時也諸侯殷見曰同荆楚之舊號也蓋時楚大諸侯共朝于楚為會同之期而鄭後至也荆曰必得封圭戎弓不然臨兵于汝荆恃強大欲行非義因鄭後期脅而迫之將求二物鄭君病之駕見亢倉子曰封圭戎弓先君得之胡綿代功實傳章翼嗣病患也綿歷也翼嗣謂後嗣先君得此二物敬而藏之欲傳示子孫以為有功之寶也今荆恃大而曰必得不然臨兵國危矣寡人欲以他封圭戎弓往若之何他封圭别圭也亢倉子曰君其少安勸君少安勿懷憂懼今是楚亦有寶於此亢倉以信義為寶也飾楚之寶以貰罪於君楚所不能為貰賒也偽以他圭欺誑大國取我誠信光飾而行雖罪可延賒終致後戮陷君於罪虧我信義故我不能為也君必致夫真勸鄭君勿以他圭往今荆以淺鮮之過而負其威刑申逞不直以耗敓與國荆失諸侯於是乎在諸侯聞之將警勸備倫比勤明會同上義固存鄭為首君姑待之豈必非福淺鮮小貌也負恃也逞快也倫比猶等倫也姑且也鄭之失期實為小過荆恃強大欲肆威刑脅迫圭弓侵奪與國無德貪取必失諸侯矣於是以胡圭戎弓往未至郢郢荆所都荆人聞之聞亢倉之謀也曰彼用聖人之訓辭吾焉取此以暴不直於天下而令諸侯實生心焉遽返其賂而益善鄭焉暴猶露也遽急也賂即鄭之圭弓也人之情欲生而惡死欲安而惡危欲榮而惡辱天下之人得其欲則樂樂則安不得其欲則苦苦則危若人主放其欲則百吏庶仧具展其欲放謂放縱也百吏百官也庶果衆事之長展申者也百吏庶仧具展其欲則天下之人貧者竭其力富者竭其財四人失其序士農工商失其次序皆不得其欲矣天下之人不得其欲則相與携持保抱逋逃隱蔽漂流音流捃采以祈性命捃拾也采取也拾取野果求養性命吏又從而捕之是故不勝其危苦因有群聚背叛之心生若群聚背叛之心生則國非其國也勿貪户口百姓汝走勿壯城池百姓汝疲賦斂不中窮者日窮刑罰且二貴者日貴科禁不行國則以傾中平之也官吏非才則寬猛失所或與百姓爭利由是狡詐之心生所以百姓姦而難知夫下難知則上人疑上人疑則下益惑下既惑則官長勞官長勞則賞不足勸刑不能禁易動而難靜此由官不得人故也政術至要力於審士力猶勤也士有才行比於一鄉委之鄉士能和比一鄉則委一鄉之政以任才行比於一縣委之縣才行比於一音州委之才行比於一國委之國政而後乃能無伏士矣各得展其才用則無隱伏之士者矣人有惡戾於鄉者則以誨之戾罪也人有罪惡者則一鄉之長先教誨之也不改是為惡戾於縣則撻之在鄉不改則送上於縣而撻之也不改是為惡戾於則移之撻之不改則送州而流移之也不改是為惡戾於國則誅之而後乃能無逆節矣誠如是舉天下之人一一胸懷無有干背慆慢之萌矣此之謂靖人賢材獲用暴惡遷善則天下之人安靜也凡為天下之務莫大求士士之待求莫善通政通政之善莫若靖人人主通達聖教則士歸之衆賢共治莫善於靖人也靖人之才蓋以文章考之百不四五文章浮華矯而不實今以文章考核靖人之才百中無四五也以言論考之十或一二有言者不必有德有德者不必有言故十中或有一二也以神氣靖作態度考之十全八九賢良心廣體胖神氣沖和動靖態度必合儀則審而察之十得八九者矣是皆賢王慶世明識裁擇所能爾也外雖有賢才而主無明識亦不能以裁擇夫下王危世以文章取士則翦巧綺濫益至而正雅𦃚音素實益藏矣末世文章尚於綺靡則雅素之士不來矣以言論取士則浮掞遊飾益來而謇諤諍直益晦矣浮遊華飾之士貴則謇諤忠諍之才伏矣以神氣靖作態度取士則外正內邪益尊而清修明實益隱矣內無明識故任擇不得其人也若然者賢愈到政愈僻令愈勤人愈亂矣用非賢為賢乃益所以亂夫天下至大器也帝王至重位也得士則靖失士則亂人主勞於求賢逸於任使於呼守天聚人者其胡可以不事誠於士乎人情失宜主所深恤失宜之大莫痛刑獄夫明達之才將欲聽訟或誘之以詐或脅之以威或開之以情或苦之以戮雖作設權異而必也公平一物失宜明主之所深恤況刑獄之大乎夫察獄問囚務得其實或有隱匿則設威以脅之或導之以實情或苦之以刑戮雖權變多端而終無枉濫也故使天下之人生無所於德死無所於怨理自當生故生無報德理自當死故死無咎怨夫秉國建吏持刑若此可謂至官至官之世群情和正諸産咸宜愛敬交深上下條固不可搖蕩有類一家苟有違順陵逆安得動哉平王反正既宅天邑務求才良等聞一善喜豫連日平王承幽厲之後天下板蕩無復紀綱於是撥亂返正東遷洛邑改革前非務求賢哲得聞一善纍日歡悅宅居也天邑即洛邑也等猶得也左右侍僕纍言大臣有賢異者如是踰歲侍僕左右小臣也見王悅喜承意阿諛也王曰余一人于德不明務求賢異益恐山澤遺逸不舉豈樂聞善以自閉塞哉乃者仄媚僕臣纍譽權任頗階左右意余孱昧無能斷明徒唯音共和依違浸長自賢敗德莫此為多不時匡遏就兹固黨仄媚邪媚也權任大臣也階升也孱弱也依違相依也邪媚小臣稱揚權任階緣左右共相蒙蔽謂我暗弱不能明察若不遏絶黨固滋深也於是棄左右近習三人市謂殺之而曝尸於市也古者刑人於市與衆共棄之貶庶司尹仧五人庶司尹仧謂權任大臣也曰無令臣君者附下罔上持祿阿意天下聞之稱為齊明海南之西歸者七國至理之世輿服純憲令寬簡禁網疏闊夫輿服純素則人不勝羡不相企羡憲令寬簡則俗無忌諱禁網疏闊則易避難犯若人不勝羡則嗜欲希微而服役樂業矣服從也從於所役之業也俗無忌諱則抑閉開舒而歡欣交通矣凡所抑閉皆由忌諱今既無忌諱皆得開舒也易避難犯則好惡分明而貴德知耻矣貴德則不犯知耻則易避夫服伇樂業之謂順歡欣交通之謂和貴德知耻之謂正浮墮之人不勝於順逆節之人不勝於和姦邪之人不勝於正順和正三者理國之宗也衰末之世輿服文巧憲令禳祈禳祈煩多者也禁網頗僻夫輿服文巧則流相炎慕俗尚文巧則下人隨流遞相企慕如火之上炎也憲令欀祈則俗多忌諱禁網頗僻則莫知所逭逭猶逃也若流相炎慕則人不忠潔而耻朴貴華矣俗多忌諱則情志不通而上下膠戾矣莫知所逭則讒禍繁興而衆不懼死矣夫耻朴貴華之謂浮上下膠戾之謂衆不懼死之謂冒真正之士不官於浮公直之士不官於器能之士不官於冒浮冒三者亂國之梯也荆君熊圉問水旱理亂熊荆之姓圉名亢倉子曰水旱由天理亂由人若人事和理雖有水旱無能為害堯湯是也堯時九年洪水湯時七年大旱故周之秩官云人強勝天秩官周書篇也若人事壞亂縱無水旱日益崩離且桀紂之滅豈惟水旱一云豈因水旱桀紂之君暴雪奢淫以滅亡非獨水旱也荆君北面遵循稽首曰天不棄不穀及此言也一本云遵修遵循退行也荆君敬重亢倉子故稱之曰天不棄不穀王公之卑稱也亢倉子不棄於我故得及聞此言者也乃以弘璧十朋為亢倉子壽拜為亞尹弘璧大璧也十朋十雙也亞尹小尹也曰庶吾國有瘳乎亢倉子不得已中宿微服違之他邦瘳差也違去也至理之世山無偽隱市無邪利朝無佞祿國産問何由得人俗醇朴國産鄭大夫公孫喬字子産也亢倉子曰政煩苛則人姦偽法令滋彰盜賊多矣政省一則人醇朴其政悶悶其人醇醇夫人俗隨國政之方圓猶蠖屈之於葉也食蒼則身蒼食黃則身黃曰何為則人富亢倉子曰賦斂以時官上清約則人富賦斂無節官上奢縱則人貧句粵之簳鏃以精金鷙隼為之羽以之掊箠則其與稿朴也無擇勾粵東粵也簳箭簳也鷙隼雕鶚之類也掊箠打擊也爾雅云東南之美者有會稽之竹箭焉夫勾粵之簳以精金為簇以隼翎為羽用之打擊則同於稿朴無擇猶無異及夫蕩寇爭音衝覿武決勝加之駭弩之上則三百步之外不立敵矣排蕩寇敵爭衝決勝加此勾粵之簳於強弩之上則前無立敵矣蜚景之劍威奪白日氣盛紫霓以之刲穫則其與刷刃也無擇蜚景神劍也刷鎌也神劍雖利以穫稻則同於鎌刃也及夫凶邪流毒沸渭不靖加之運掌之上則千里之內不留行矣凶邪流毒謂溫疫之氣也此神劍能辟凶邪故威光所行則千里之內未嘗止也夫材有分而用有當所貴善因時而已耳稿朴刷刃施於常用耳粵簳蜚景以禦凶災材分所當各因時而貴也昔者明皇聖帝天下和平萬物暢茂群性得極善因時而勿擾者也近古是來天下姦邪者衆正直者寡輕薄趍利者多敦方退靜者鮮姦者出言仧於忠言巧偽亂真不能辨也遂使天下之人交相疑害悲夫作法貴於易避而難犯救弊貴於省事而一令除去豪橫則官人安刑禁必行則官人不敢務私利官人不敢務私利而百姓富史刑曰眚災肆赦赦不欲數赦數則惡者得計平人生心惡者得計務益於姦平人生心亦為不善也而賢良否塞矣人有大為賊害官吏捕獲因廣條引誣陷頁良闊遠牽率冀推時序卒蒙赦宥遇賊害者訖無所快自毒而已由是平人遞生黠計吏勞政酷莫能鎮止此由數赦之過也夫人之所以惡為無道不義者為其有罰也所以勉為有道行義者為其有賞也今無道不義者赦之而有道行義者被妎音害而不賞欲人之就善也不亦難乎世有賢主秀士肯察此論訖猶終也快喜也毒苦也肯可也人怨若非不接人也神怒者非不事神也巧佞甚人愈怨淫祀盛神益怒洞靈真經卷上
